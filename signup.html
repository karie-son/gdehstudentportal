<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDEH Student Registration</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

.header{
  display:flex;
  align-items:center;
  padding:15px;
  position:relative;
}

.logo{
  position:absolute;
  left:45px;
  width:90px;
}

.title{
  margin:0 auto;
  color:orange;
  font-size:22px;
  font-weight:bold;
}

.container{
  width:90%;
  max-width:900px;
  margin:20px auto;
}

.section{
  border-left:4px solid gold;
  padding:15px;
  margin-bottom:20px;
  background:#1a1a1a;
  border-radius:8px;
}

.section h3{
  margin-top:0;
  color:gold;
}

input, select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:2px solid gold;
  background:transparent;
  color:white;
  border-radius:6px;
  outline:none;
}

button{
  display:block;
  margin:20px auto;
  padding:10px 25px;
  background:gold;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <img src="gdeh_logo.png" class="logo">
  <h2 class="title">GDEH STUDENT PORTAL</h2>
</div>

<div class="container">

<!-- STUDENT DETAILS -->
<div class="section">
  <h3>Student Details</h3>

  <input id="fname" placeholder="First Name" required>
  <input id="lname" placeholder="Last Name" required>
  <input id="dob" type="date" required>

  <select id="gender" required>
    <option value="">Gender</option>
    <option>Male</option>
    <option>Female</option>
  </select>

  <input id="country" placeholder="Country" required>
  <input id="county" placeholder="County" required>
  <input id="subcounty" placeholder="Sub County" required>
  <input id="ward" placeholder="Ward" required>

  <input id="phone" placeholder="Phone" required>
  <input id="email" type="email" placeholder="Email" required>
  <input id="password" type="password" placeholder="Password" required>
</div>

<!-- COURSE -->
<div class="section">
  <h3>Course Details</h3>

  <input id="course" placeholder="Course" required>

  <select id="intake" required>
    <option value="">Intake</option>
    <option>May</option>
    <option>September</option>
    <option>December</option>
  </select>

  <input id="regdate" type="date" required>

  <select id="mode" required>
    <option value="">Mode</option>
    <option>Morning</option>
    <option>Evening</option>
    <option>Holiday</option>
  </select>
</div>

<!-- EMERGENCY -->
<div class="section">
  <h3>Emergency Contact</h3>

  <input id="emergencyName" placeholder="Name" required>

  <select id="relationship" required>
    <option value="">Relationship</option>
    <option>Father</option>
    <option>Mother</option>
    <option>Sibling</option>
    <option>Friend</option>
  </select>
</div>

<button onclick="signup()">Sign Up</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAfU4nLbLjrotVYaLXlB8M6ePM5lu6FfUU",
  authDomain: "gdeh-student-portal.firebaseapp.com",
  projectId: "gdeh-student-portal",
  storageBucket: "gdeh-student-portal.firebasestorage.app",
  messagingSenderId: "376874530975",
  appId: "1:376874530975:web:95e97098fc8708e5b94aaa"
};

// Init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SIGNUP FUNCTION
window.signup = async function () {

  try {
    await addDoc(collection(db, "students"), {

      firstName: document.getElementById("fname").value,
      lastName: document.getElementById("lname").value,
      dob: document.getElementById("dob").value,
      gender: document.getElementById("gender").value,

      country: document.getElementById("country").value,
      county: document.getElementById("county").value,
      subcounty: document.getElementById("subcounty").value,
      ward: document.getElementById("ward").value,

      phone: document.getElementById("phone").value,
      email: document.getElementById("email").value,
      password: document.getElementById("password").value, // ⚠️ not secure

      course: document.getElementById("course").value,
      intake: document.getElementById("intake").value,
      mode: document.getElementById("mode").value,
      regdate: document.getElementById("regdate").value,

      emergencyName: document.getElementById("emergencyName").value,
      relationship: document.getElementById("relationship").value,

      createdAt: new Date()
    });

    alert("Signup successful ✅");
    window.location.href = "index.html";

  } catch (error) {
    console.error(error);
    alert("Signup failed ❌");
  }
};

</script>
</body>
</html>
