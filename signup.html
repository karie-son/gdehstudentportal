<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDEH Student Portal</title>


  <style>
body{
  margin:0;
  font-family:Arial;
  background:white;
}
.header{
  padding:10px 20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.logo{
  width:120px;
  height:auto;
}

/* HEADER TITLE */
.title{
  text-align:center;
  font-size:14px;
  font-weight:bold;
  color:orange;
  margin-top:15px;
}



/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

/* SECTION HEADINGS */
.section h3{
  font-size:12px;
  font-weight:bold;
  color: orange;
  margin-top:20px;
  border-bottom:1px solid #ccc;
  padding-bottom:4px;
}

/* LABELS (VERY SMALL) */
label{
  font-size:11px;
  color:black;
}

/* INPUTS */
input, select, textarea{
  width:100%;
  padding:7px;
  margin-top:4px;
  border:1px solid #ccc;
  border-radius:5px;
  font-size:12px;
}

/* FORM GROUP */
.form-group{
  margin-top:10px;
}

/* BUTTON STYLE */
button{
  width:60%;
  padding:8px;
  margin:20px auto;
  display:block;
  background:orange;
  color:white;
  border:none;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;

  /* glow effect */
  box-shadow:0 0 10px orange;
  transition:0.3s ease;
}

/* hover glow stronger */
button:hover{
  box-shadow:0 0 18px orange;
  transform:scale(1.03);
}
</style>
</head>

<body>

<div class="header">
  <img src="gdeh_logo.png" class="logo">
</div>

<div class="title">GDEH STUDENT PORTAL REGISTRATION</div>

<div class="container">

<form id="studentForm">

<!-- PERSONAL INFO -->
<div class="section">
<h3>Personal Information</h3>

<div class="form-group">
<label>First Name</label>
<input name="firstName" required>
</div>

<div class="form-group">
<label>Last Name</label>
<input name="lastName" required>
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="form-group">
<label>Marital Status</label>
<select name="maritalStatus" required>
<option value="">Select</option>
<option>Single</option>
<option>Married</option>
</select>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" name="dob" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input name="phone" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>ID Number / Passport</label>
<input name="idNumber" required>
</div>

</div>

<!-- LOCATION -->
<div class="section">
<h3>Location & Address</h3>

<div class="form-group">
<label>County</label>
<select id="county" name="county" required>
<option value="">Select County</option>
</select>
</div>

<div class="form-group">
<label>Sub County</label>
<select id="subCounty" name="subCounty" required>
<option value="">Select Sub County</option>
</select>
</div>

<div class="form-group">
<label>Ward</label>
<select id="ward" name="ward" required>
<option value="">Select Ward</option>
</select>
</div>

<div class="form-group">
<label>Current Address</label>
<textarea name="currentAddress" required></textarea>
</div>

<div class="form-group">
<label>Permanent Address</label>
<textarea name="permanentAddress" required></textarea>
</div>

</div>

<!-- COURSE -->
<div class="section">
<h3>Course Details</h3>

<div class="form-group">
<label>Course Name</label>
<input name="course" required>
</div>

<div class="form-group">
<label>Intake</label>
<select name="intake" required>
<option>January</option>
<option>May</option>
<option>September</option>
</select>
</div>

<div class="form-group">
<label>Mode</label>
<select name="mode" required>
<option>Full Time</option>
<option>Part Time</option>
<option>Online</option>
</select>
</div>

</div>

<!-- EMERGENCY -->
<div class="section">
<h3>Emergency Contact</h3>

<div class="form-group">
<label>Full Name</label>
<input name="emergencyName" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input name="emergencyPhone" required>
</div>

<div class="form-group">
<label>Relationship</label>
<select name="relationship" required>
<option>Parent</option>
<option>Sibling</option>
<option>Guardian</option>
<option>Friend</option>
</select>
</div>

</div>

<div class="form-group">
<input type="checkbox" required> I agree to Privacy Policy
</div>

<button type="submit">Submit Registration</button>

</form>

</div>
<script type="module">
import kenyaData from "./kenyaData.js";
import { registerStudent } from "./firebase.js";
/* just run directly */
  /* =========================
     ELEMENTS (FIXED ID)
  ========================= */
  const countySelect = document.getElementById("county");
  const subCountySelect = document.getElementById("subCounty");
  const wardSelect = document.getElementById("ward");
  const form = document.getElementById("studentForm"); // FIXED

  if (!countySelect || !subCountySelect || !wardSelect || !form) {
    console.error("Missing form elements");
    return;
  }

  /* =========================
     LOAD COUNTIES (SAFE METHOD)
  ========================= */
  Object.keys(kenyaData).forEach(county => {
    const option = document.createElement("option");
    option.value = county;
    option.textContent = county;
    countySelect.appendChild(option);
  });

  /* =========================
     COUNTY → SUBCOUNTY
  ========================= */
  countySelect.addEventListener("change", () => {

    subCountySelect.innerHTML = "<option value=''>Select Sub County</option>";
    wardSelect.innerHTML = "<option value=''>Select Ward</option>";

    const subs = kenyaData[countySelect.value] || {};

    Object.keys(subs).forEach(sub => {
      const option = document.createElement("option");
      option.value = sub;
      option.textContent = sub;
      subCountySelect.appendChild(option);
    });
  });

  /* =========================
     SUBCOUNTY → WARD
  ========================= */
  subCountySelect.addEventListener("change", () => {

    wardSelect.innerHTML = "<option value=''>Select Ward</option>";

    const wards = kenyaData[countySelect.value]?.[subCountySelect.value] || [];

    wards.forEach(w => {
      const option = document.createElement("option");
      option.value = w;
      option.textContent = w;
      wardSelect.appendChild(option);
    });
  });

  /* =========================
     SUBMIT SIGNUP (FIXED SAFETY)
  ========================= */
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    if (!data.firstName || !data.lastName || !data.email) {
      alert("Please fill required fields");
      return;
    }

    try {
      await registerStudent(data);

      alert("✅ Account created successfully");
      window.location.href = "index.html";

    } catch (error) {
      console.error("Signup error:", error);
      alert("❌ Signup failed");
    }
  });

});
</script>
</body>
</html>
