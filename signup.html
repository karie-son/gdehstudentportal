<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDEH Student Portal</title>


  <style>
body{
  margin:0;
  font-family:Arial;
  background:white;
}
.header{
  padding:10px 20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.logo{
  width:120px;
  height:auto;
}

/* HEADER TITLE */
.title{
  text-align:center;
  font-size:14px;
  font-weight:bold;
  color:orange;
  margin-top:15px;
}



/* CONTAINER */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

/* SECTION HEADINGS */
.section h3{
  font-size:12px;
  font-weight:bold;
  color: orange;
  margin-top:20px;
  border-bottom:1px solid #ccc;
  padding-bottom:4px;
}

/* LABELS (VERY SMALL) */
label{
  font-size:11px;
  color:black;
}

/* INPUTS */
input, select, textarea{
  width:100%;
  padding:7px;
  margin-top:4px;
  border:1px solid #ccc;
  border-radius:5px;
  font-size:12px;
}

/* FORM GROUP */
.form-group{
  margin-top:10px;
}

/* BUTTON STYLE */
button{
  width:60%;
  padding:8px;
  margin:20px auto;
  display:block;
  background:orange;
  color:white;
  border:none;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;

  /* glow effect */
  box-shadow:0 0 10px orange;
  transition:0.3s ease;
}

/* hover glow stronger */
button:hover{
  box-shadow:0 0 18px orange;
  transform:scale(1.03);
}
.footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:orange;
  margin-top:40px;
  border-top:1px solid #eee;
}
.password-box{
  position:relative;
}

.password-box input{
  width:100%;
  padding-right:35px;
}

.input-wrap{
  position:relative;
}

.input-wrap input{
  width:100%;
  padding-right:45px;
}

/* BLACK CIRCLE */
.toggle-btn{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  width:22px;
  height:22px;
  background:black;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  cursor:pointer;
  user-select:none;
  transition:0.2s ease;
}

/* HOVER EFFECT */
.toggle-btn:hover{
  background:orange;
  color:black;
  transform:translateY(-50%) scale(1.1);
}
</style>
</head>

<body>

<div class="header">
  <img src="gdeh_png.png" class="logo">
</div>

<div class="title">GDEH STUDENT PORTAL REGISTRATION</div>

<div class="container">

<form id="studentForm">

<!-- PERSONAL INFO -->
<div class="section">
<h3>Personal Information</h3>

<div class="form-group">
<label>First Name</label>
<input name="firstName" required>
</div>

<div class="form-group">
<label>Last Name</label>
<input name="lastName" required>
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="form-group">
<label>Marital Status</label>
<select name="maritalStatus" required>
<option value="">Select</option>
<option>Single</option>
<option>Married</option>
</select>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" name="dob" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input name="phone" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>ID Number / Passport</label>
<input name="idNumber" required>
</div>

</div>

<!-- LOCATION -->
<div class="section">
<h3>Location & Address</h3>

<div class="form-group">
<label>County</label>
<select id="county" name="county" required>
<option value="">Select County</option>
</select>
</div>

<div class="form-group">
<label>Sub County</label>
<select id="subCounty" name="subCounty" required>
<option value="">Select Sub County</option>
</select>
</div>

<div class="form-group">
<label>Ward</label>
<select id="ward" name="ward" required>
<option value="">Select Ward</option>
</select>
</div>

<div class="form-group">
<label>Current Address</label>
<textarea name="currentAddress" required></textarea>
</div>

<div class="form-group">
<label>Permanent Address</label>
<textarea name="permanentAddress" required></textarea>
</div>

</div>

<!-- COURSE -->
<div class="section">
<h3>Course Details</h3>

<div class="form-group">
<label>Course Name</label>
<input name="course" required>
</div>

<div class="form-group">
<label>Intake</label>
<select name="intake" required>
<option>January</option>
<option>May</option>
<option>September</option>
</select>
</div>

<div class="form-group">
<label>Mode</label>
<select name="mode" required>
<option>Full Time</option>
<option>Part Time</option>
<option>Online</option>
</select>
</div>

</div>

<!-- EMERGENCY -->
<div class="section">
<h3>Emergency Contact</h3>

<div class="form-group">
<label>Full Name</label>
<input name="emergencyName" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input name="emergencyPhone" required>
</div>

<div class="form-group">
<label>Relationship</label>
<select name="relationship" required>
<option>Parent</option>
<option>Sibling</option>
<option>Guardian</option>
<option>Friend</option>
</select>
</div>

</div>
<div class="section">
  <h3>Account Security</h3>

  <!-- PASSWORD -->
  <div class="form-group password-box">
    <label>Password</label>

    <div class="input-wrap">
      <input type="password" id="password" name="password" required minlength="6">

      <div class="toggle-btn" onclick="togglePassword('password', this)">
        ●
      </div>
    </div>
  </div>

  <!-- CONFIRM PASSWORD -->
  <div class="form-group password-box">
    <label>Confirm Password</label>

    <div class="input-wrap">
      <input type="password" id="confirmPassword" name="confirmPassword" required>

      <div class="toggle-btn" onclick="togglePassword('confirmPassword', this)">
        ●
      </div>
    </div>
  </div>
  

<div class="form-group">
<input type="checkbox" required> I agree to Privacy Policy
</div>


</div>



<button type="submit">Submit Registration</button>

</form>

</div>
<footer class="footer">
  © GDEH STUDENT PORTAL. All rights reserved
</footer>
<script type="module" src="signup.js"></script>

</body>
</html>
