<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1a1a1a;
  padding:25px;
  border-radius:10px;
  width:300px;
  border:1px solid orange;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:orange;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>Admin Login</h2>

  <input type="email" id="email" placeholder="Admin Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="adminLoginCheck()">Login</button>
</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
