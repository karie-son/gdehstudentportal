<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDEH Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  padding:15px;
}

.logo{
  width:120px;
  height:auto;
}

/* TITLE */
h2{
  text-align:center;
  color:orange;
  margin-top:0;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* SEARCH BAR */
.top-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:15px;
}

input{
  padding:10px;
  border-radius:6px;
  border:none;
  outline:none;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

/* BUTTON COLORS */
.update{ background:green; color:white; }
.delete{ background:red; color:white; }

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border:1px solid #333;
}

th{
  background:#b8860b;
}

tr:hover{
  background:#1a1a1a;
}

/* PROFILE IMAGE */
.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  vertical-align:middle;
  margin-right:8px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:15px;
  margin-top:20px;
  font-size:12px;
  color:#aaa;
  border-top:1px solid #333;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="gdeh_logo.png" class="logo">
</div>

<h2>GDEH ADMIN PANEL</h2>

<div class="container">

<!-- TOP BAR -->
<div class="top-bar">

  <input id="search" placeholder="Search by name/email">

  <button onclick="searchStudents()">Search</button>

  <div style="margin-left:auto;">
    Total: <span id="total">0</span> |
    Completed: <span id="completed">0</span>
  </div>

</div>

<!-- TABLE -->
<table border="1" width="100%">
  <thead>
    <tr>
      <th>#</th>
        <th>profile photo</th>
      <th>Name</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Course</th>
      <th>Intake</th>
    </tr>
  </thead>

  <tbody id="adminStudentTable"></tbody>
</table>

</div>

<!-- FOOTER -->
<div class="footer">
  © Powered by GDEH ICT TEAM
</div>

<script type="module" src="admin-firebase.js">
</script>
</body>
</html>
