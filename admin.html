<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDEH Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  padding:15px;
}

.logo{
  width:120px;
  height:auto;
}

/* TITLE */
h2{
  text-align:center;
  color:orange;
  margin-top:0;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* SEARCH BAR */
.top-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:15px;
}

input{
  padding:10px;
  border-radius:6px;
  border:none;
  outline:none;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

/* BUTTON COLORS */
.update{ background:green; color:white; }
.delete{ background:red; color:white; }

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  padding:10px;
  border:1px solid #333;
}

th{
  background:#b8860b;
}

tr:hover{
  background:#1a1a1a;
}

/* PROFILE IMAGE */
.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  vertical-align:middle;
  margin-right:8px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:15px;
  margin-top:20px;
  font-size:12px;
  color:#aaa;
  border-top:1px solid #333;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="gdeh_logo.png" class="logo">
</div>

<h2>GDEH ADMIN PANEL</h2>

<div class="container">

<!-- TOP BAR -->
<div class="top-bar">

  <input id="search" placeholder="Search by name/email">

  <button onclick="searchStudents()">Search</button>

  <div style="margin-left:auto;">
    👥 Total: <span id="total">0</span> |
    ✅ Completed: <span id="completed">0</span>
  </div>

</div>

<!-- TABLE -->
<table>
<thead>
<tr>
  <th>Name</th>
  <th>Email</th>
  <th>Phone</th>
  <th>Course</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<!-- FOOTER -->
<div class="footer">
  © Powered by GDEH ICT TEAM
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfU4nLbLjrotVYaLXlB8M6ePM5lu6FfUU",
  authDomain: "gdeh-student-portal.firebaseapp.com",
  projectId: "gdeh-student-portal",
  storageBucket: "gdeh-student-portal.firebasestorage.app",
  messagingSenderId: "376874530975",
  appId: "1:376874530975:web:95e97098fc8708e5b94aaa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allStudents = [];

// LOAD STUDENTS
async function loadStudents(){

  const table = document.getElementById("table");
  table.innerHTML = "";

  const snapshot = await getDocs(collection(db, "students"));

  let total = 0;
  let completed = 0;

  allStudents = [];

  snapshot.forEach(docSnap => {

    const data = docSnap.data();
    const id = docSnap.id;

    total++;
    if(data.status === "completed") completed++;

    allStudents.push({ ...data, id });

  });

  document.getElementById("total").innerText = total;
  document.getElementById("completed").innerText = completed;

  renderStudents(allStudents);
}

// RENDER
function renderStudents(list){

  const table = document.getElementById("table");
  table.innerHTML = "";

  list.forEach(data => {

    const row = `
      <tr>
        <td>
          <img src="${data.photoUrl || 'https://via.placeholder.com/40'}" class="avatar">
          ${data.firstName || ""} ${data.lastName || ""}
        </td>

        <td>${data.email || ""}</td>
        <td>${data.phone || ""}</td>
        <td>${data.course || ""}</td>
        <td>${data.status || "active"}</td>

        <td>
          <button class="update" onclick="updateStatus('${data.id}')">Complete</button>
          <button class="delete" onclick="deleteStudent('${data.id}')">Delete</button>
        </td>
      </tr>
    `;

    table.innerHTML += row;
  });
}

// SEARCH
window.searchStudents = function(){

  const term = document.getElementById("search").value.toLowerCase();

  const filtered = allStudents.filter(s =>
    (s.firstName || "").toLowerCase().includes(term) ||
    (s.email || "").toLowerCase().includes(term)
  );

  renderStudents(filtered);
};

// UPDATE STATUS
window.updateStatus = async function(id){

  await updateDoc(doc(db, "students", id), {
    status: "completed"
  });

  loadStudents();
};

// DELETE
window.deleteStudent = async function(id){

  if(!confirm("Delete this student?")) return;

  await deleteDoc(doc(db, "students", id));

  loadStudents();
};

// INIT
loadStudents();

</script>

</body>
</html>
