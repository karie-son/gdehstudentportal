<!DOCTYPE html>
<html>
<head>
<title>Sign In - GDEH</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:white;
}

/* HEADER LOGO CENTER */
.header{
  display:flex;
  justify-content:center;
  padding:10px;
}

.logo{
  width:120px;
  height:auto;
}

/* TITLE */
.title{
  text-align:center;
  font-size:16px;
  font-weight:bold;
  color:orange;
  margin-top:10px;
}

/* FORM CONTAINER */
.container{
  max-width:320px;
  margin:auto;
  margin-top:40px;
}
.login-box{
  max-width:320px;
  margin:40px auto;
  padding:20px;

  border:2px solid orange;
  border-radius:12px;

  box-shadow:0 0 15px orange;
  background:white;

  transition:0.3s ease;
}

/* stronger glow on hover */
.login-box:hover{
  box-shadow:0 0 25px orange;
}


/* LABELS VERY SMALL */
label{
  font-size:10px;
  color:black;
}

/* INPUTS SMALL WIDTH */
input{
  width:100%;
  padding:6px;
  margin-top:4px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:12px;
}

.btn{
  width:100%;
  margin-top:15px;
  padding:8px;
  background:orange;
  border:none;
  border-radius:5px;
  color:white;
  font-size:13px;
  cursor:pointer;
}

.btn:hover{
  background:darkorange;
}
.footer{
  text-align:center;
  padding:15px;
  font-size:12px;
  font-weight: normal;
  color:orange;
  margin-top:40px;
}
</style>
</head>

<body>

<div class="header">
  <img src="gdeh_png.png" class="logo">
</div>

<div class="container">

<div class="title">GDEH STUDENT PORTAL SIGNIN</div>

<div class="login-box">

<form id="loginForm">

<label>Email</label>
<input name="email" required>

<label>Password</label>
<input type="password" name="password" required>



<button type="submit" class="btn">Sign In</button>
  </form>

<div class="link">
New Student   <a href="signup.html">Create Account</a>
</div>


<footer class="footer">
  © GDEH ICT TEAM. All rights reserved
</footer>

<script type="module" src="signin.js"></script>
</body>
</html>
