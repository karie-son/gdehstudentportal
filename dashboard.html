<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{
  font-family:Arial;
  background:white;
  margin:0;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

input{
  width:100%;
  padding:8px;
  margin-top:5px;
  box-sizing:border-box;
}

.button{
  background:green;
  color:white;
  padding:10px;
  width:100%;
  margin-top:15px;
  border:none;
  cursor:pointer;
}

.footer{
  text-align:center;
  padding:15px;
  margin-top:30px;

  font-size:12px;
  font-weight:bold;

  color:orange;

  border-top:1px solid #eee;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Dashboard</h2>

<form id="profileForm">

<!-- PERSONAL INFO -->
<div class="section">
<h3>Personal Information</h3>

<input name="firstName" placeholder="First Name">
<input name="lastName" placeholder="Last Name">

<select name="gender">
  <option>Male</option>
  <option>Female</option>
</select>

<select name="maritalStatus">
  <option>Single</option>
  <option>Married</option>
</select>

<input type="date" name="dob">

<input name="phone" placeholder="Phone">
<input name="email" placeholder="Email">
<input name="idNumber" placeholder="ID Number">
</div>

<!-- LOCATION -->
<div class="section">
<h3>Location & Address</h3>

<select id="county" name="county"></select>
<select id="subCounty" name="subCounty"></select>
<select id="ward" name="ward"></select>

<textarea name="currentAddress" placeholder="Current Address"></textarea>
<textarea name="permanentAddress" placeholder="Permanent Address"></textarea>
</div>

<!-- COURSE -->
<div class="section">
<h3>Course Details</h3>

<input name="course" placeholder="Course Name">

<select name="intake">
  <option>January</option>
  <option>May</option>
  <option>September</option>
</select>

<select name="mode">
  <option>Full Time</option>
  <option>Part Time</option>
  <option>Online</option>
</select>
</div>

<!-- EMERGENCY -->
<div class="section">
<h3>Emergency Contact</h3>

<input name="emergencyName" placeholder="Full Name">
<input name="emergencyPhone" placeholder="Phone">

<select name="relationship">
  <option>Parent</option>
  <option>Sibling</option>
  <option>Guardian</option>
  <option>Friend</option>
</select>
</div>

<button type="submit">Update Profile</button>

</form>
<button id="logoutBtn">Logout</button>

</div>
<footer class="footer">
  © GDEH STUDENT Dashboard. All rights reserved
</footer>
<script type="module" src="dashboard.js"></script>
</body>
</html>
