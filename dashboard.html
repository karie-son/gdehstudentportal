<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{
  font-family:Arial;
  background:white;
  margin:0;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

input{
  width:100%;
  padding:8px;
  margin-top:5px;
  box-sizing:border-box;
}

.button{
  background:green;
  color:white;
  padding:10px;
  width:100%;
  margin-top:15px;
  border:none;
  cursor:pointer;
}

.footer{
  text-align:center;
  padding:15px;
  margin-top:30px;

  font-size:12px;
  font-weight:bold;

  color:orange;

  border-top:1px solid #eee;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Dashboard</h2>

<form id="profileForm">

<!-- PERSONAL INFO -->
<div class="section">
<h3>Personal Information</h3>

<input name="firstName" placeholder="First Name">
<input name="lastName" placeholder="Last Name">

<select name="gender">
  <option>Male</option>
  <option>Female</option>
</select>

<select name="maritalStatus">
  <option>Single</option>
  <option>Married</option>
</select>

<input type="date" name="dob">

<input name="phone" placeholder="Phone">
<input name="email" placeholder="Email">
<input name="idNumber" placeholder="ID Number">
</div>

<!-- LOCATION -->
<div class="section">
<h3>Location & Address</h3>

<select id="county" name="county"></select>
<select id="subCounty" name="subCounty"></select>
<select id="ward" name="ward"></select>

<textarea name="currentAddress" placeholder="Current Address"></textarea>
<textarea name="permanentAddress" placeholder="Permanent Address"></textarea>
</div>

<!-- COURSE -->
<div class="section">
<h3>Course Details</h3>

<input name="course" placeholder="Course Name">

<select name="intake">
  <option>January</option>
  <option>May</option>
  <option>September</option>
</select>

<select name="mode">
  <option>Full Time</option>
  <option>Part Time</option>
  <option>Online</option>
</select>
</div>

<!-- EMERGENCY -->
<div class="section">
<h3>Emergency Contact</h3>

<input name="emergencyName" placeholder="Full Name">
<input name="emergencyPhone" placeholder="Phone">

<select name="relationship">
  <option>Parent</option>
  <option>Sibling</option>
  <option>Guardian</option>
  <option>Friend</option>
</select>
</div>

<button type="submit">Update Profile</button>

</form>
<button id="logoutBtn">Logout</button>

</div>
<footer class="footer">
  © GDEH STUDENT Dashboard. All rights reserved
</footer>
<script type="module">
import { getSession, getStudentById, updateStudent, logout } from "./firebase.js";
import kenyaData from "./kenyaData.js";

/* =========================
   SESSION CHECK
========================= */
const user = getSession();

if (!user) {
  window.location.href = "index.html";
}

/* =========================
   ELEMENTS
========================= */
const form = document.getElementById("profileForm");
const county = document.getElementById("county");
const subCounty = document.getElementById("subCounty");
const ward = document.getElementById("ward");

/* =========================
   LOAD COUNTIES
========================= */
function loadCounties() {
  county.innerHTML = "<option value=''>Select County</option>";

  Object.keys(kenyaData).forEach(c => {
    county.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

loadCounties();

/* =========================
   LOAD SUBCOUNTIES
========================= */
function loadSubCounties(countyName) {
  subCounty.innerHTML = "<option value=''>Select Sub County</option>";
  ward.innerHTML = "<option value=''>Select Ward</option>";

  const subs = kenyaData[countyName] || {};

  Object.keys(subs).forEach(sc => {
    subCounty.innerHTML += `<option value="${sc}">${sc}</option>`;
  });
}

/* =========================
   LOAD WARDS
========================= */
function loadWards(countyName, subCountyName) {
  ward.innerHTML = "<option value=''>Select Ward</option>";

  const wards = kenyaData[countyName]?.[subCountyName] || [];

  wards.forEach(w => {
    ward.innerHTML += `<option value="${w}">${w}</option>`;
  });
}

/* =========================
   EVENTS
========================= */
county.addEventListener("change", () => {
  loadSubCounties(county.value);
});

subCounty.addEventListener("change", () => {
  loadWards(county.value, subCounty.value);
});

/* =========================
   LOAD PROFILE
========================= */
async function loadProfile() {
  const data = await getStudentById(user.id);

  if (!data) return;

  /* fill inputs safely */
  Object.keys(data).forEach(key => {
    if (form[key]) {
      form[key].value = data[key];
    }
  });

  /* =========================
     RESTORE LOCATION
  ========================= */
  if (data.county) {
    county.value = data.county;

    loadSubCounties(data.county);

    if (data.subCounty) {
      subCounty.value = data.subCounty;

      loadWards(data.county, data.subCounty);

      if (data.ward) {
        ward.value = data.ward;
      }
    }
  }
}

loadProfile();

/* =========================
   UPDATE PROFILE
========================= */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(form).entries());

  const success = await updateStudent(user.id, data);

  if (success !== false) {
    alert("Profile updated successfully");
  } else {
    alert("Update failed");
  }
});

/* =========================
   LOGOUT
========================= */
document.getElementById("logoutBtn").addEventListener("click", () => {
  logout();
  window.location.href = "index.html";
});
</script>
</body>
</html>
