<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

h2{
  text-align:center;
}

.content{
  max-width:500px;
  margin:auto;
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  border:1px solid orange;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:orange;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="content">

  <!-- PROFILE -->
  <img id="profilePhoto" width="120" height="120"
style="border-radius:50%; border:2px solid gold;"
alt="Profile Photo">
  <h2 id="profileName"></h2>

  <p>Email: <span id="profileEmail"></span></p>
  <p>Phone: <span id="profilePhone"></span></p>
  <p>Course: <span id="profileCourse"></span></p>

  <hr>

  <!-- EDIT -->
  <h3>Edit Profile</h3>

  <input id="editPhone" placeholder="New phone">
  <input id="editCourse" placeholder="New course">

  <button onclick="updateMyProfile()">Save Changes</button>
<button onclick="logout()">Logout</button>
</div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
