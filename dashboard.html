<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

h2{
  text-align:center;
}

.content{
  max-width:500px;
  margin:auto;
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  border:1px solid orange;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:orange;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="content">

  <!-- PROFILE -->
  <h2 id="profileName"></h2>

  <p>Email: <span id="profileEmail"></span></p>
  <p>Phone: <span id="profilePhone"></span></p>
  <p>Course: <span id="profileCourse"></span></p>

  <hr>

  <!-- EDIT -->
  <h3>Edit Profile</h3>

  <input id="editPhone" placeholder="New phone">
  <input id="editCourse" placeholder="New course">

  <button onclick="updateMyProfile()">Save Changes</button>

</div>


<!-- FIREBASE + PROFILE LOGIC -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAfU4nLbLjrotVYaLXlB8M6ePM5lu6FfUU",
  authDomain: "gdeh-student-portal.firebaseapp.com",
  projectId: "gdeh-student-portal",
  storageBucket: "gdeh-student-portal.firebasestorage.app",
  messagingSenderId: "376874530975",
  appId: "1:376874530975:web:95e97098fc8708e5b94aaa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// =========================
// LOAD LOGGED-IN STUDENT
// =========================
async function loadMyProfile() {

  const email = localStorage.getItem("studentEmail");

  if (!email) {
    window.location.href = "index.html";
    return;
  }

  const snapshot = await getDocs(collection(db, "students"));

  snapshot.forEach((docSnap) => {

    const d = docSnap.data();

    if (d.email === email) {

      document.getElementById("profileName").innerText =
        d.firstName + " " + d.lastName;

      document.getElementById("profileEmail").innerText = d.email;
      document.getElementById("profilePhone").innerText = d.phone;
      document.getElementById("profileCourse").innerText = d.course;

      // store ID for update
      localStorage.setItem("studentDocId", docSnap.id);
    }
  });
}


// =========================
// UPDATE PROFILE
// =========================
window.updateMyProfile = async function () {

  const id = localStorage.getItem("studentDocId");

  if (!id) return;

  await updateDoc(doc(db, "students", id), {
    phone: document.getElementById("editPhone").value,
    course: document.getElementById("editCourse").value
  });

  alert("Profile updated ✅");
  loadMyProfile();
};


// INIT
loadMyProfile();

</script>

</body>
</html>
