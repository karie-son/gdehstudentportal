<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}
img{
  display:block;
  margin:auto;
}

h2{
  text-align:center;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td{
  padding:10px;
  border:1px solid #333;
  text-align:left;
}

th{
  background:#b8860b;
}

tr:hover{
  background:#1a1a1a;
}
</style>
</head>
<body>

<h2>Registered Students</h2>

<table>
<thead>
<tr>
  <th>ID</th>
  <th>Photo</th>
  <th>Name</th>
  <th>Phone</th>
  <th>Email</th>
  <th>Gender</th>

  <th>Country</th>
  <th>County</th>
  <th>Sub County</th>
  <th>Ward</th>

  <th>Course</th>
  <th>Intake</th>
  <th>Mode</th>

  <th>Emergency</th>
  <th>Relationship</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>
</table>

<!-- FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// SAME CONFIG (must match firebase.js)
const firebaseConfig = {
  apiKey: "AIzaSyAfU4nLbLjrotVYaLXlB8M6ePM5lu6FfUU",
  authDomain: "gdeh-student-portal.firebaseapp.com",
  projectId: "gdeh-student-portal",
  storageBucket: "gdeh-student-portal.firebasestorage.app",
  messagingSenderId: "376874530975",
  appId: "1:376874530975:web:95e97098fc8708e5b94aaa"
};

// Init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// FETCH DATA
async function loadStudents() {

  const table = document.getElementById("studentTable");
  table.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "students"));

  let count = 1;

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    const row = `
<tr>

  <td>${count++}</td>

  <td>
    <img src="${data.photoUrl || 'https://via.placeholder.com/50'}"
         style="width:50px; height:50px; border-radius:50%; object-fit:cover; border:2px solid gold;">
  </td>

  <td>${data.firstName || ""} ${data.lastName || ""}</td>

  <td>${data.phone || ""}</td>
  <td>${data.email || ""}</td>

  <td>${data.gender || ""}</td>

  <td>${data.country || ""}</td>
  <td>${data.county || ""}</td>
  <td>${data.subcounty || ""}</td>
  <td>${data.ward || ""}</td>

  <td>${data.course || ""}</td>
  <td>${data.intake || ""}</td>
  <td>${data.mode || ""}</td>

  <td>${data.emergencyName || ""}</td>
  <td>${data.relationship || ""}</td>

</tr>
`;

    table.innerHTML += row;
  });
}

// Load on page open
loadStudents();

</script>

</body>
</html>
