<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#1a1a1a;
  border-bottom:2px solid orange;
}

.title{
  color:orange;
  font-weight:bold;
}

.logout{
  background:orange;
  border:none;
  padding:8px 15px;
  cursor:pointer;
  border-radius:5px;
}

/* PROFILE CARD */
.container{
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:10px;
  border-left:4px solid gold;
  max-width:600px;
  margin:auto;
  text-align:center;
}

.card h2{
  color:gold;
  margin-bottom:10px;
}

/* PROFILE IMAGE */
.profile-img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid orange;
  object-fit:cover;
  margin-bottom:10px;
}

/* INFO */
.info{
  margin:6px 0;
  font-size:15px;
  text-align:left;
}

.label{
  color:orange;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">GDEH Student Dashboard</div>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<!-- PROFILE -->
<div class="container">
  <div class="card">

    <!-- PROFILE IMAGE -->
    <img id="profileImg" class="profile-img" src="https://via.placeholder.com/120">

    <h2 id="fullname">Loading...</h2>

    <p class="info"><span class="label">Email:</span> <span id="email"></span></p>
    <p class="info"><span class="label">Phone:</span> <span id="phone"></span></p>
    <p class="info"><span class="label">Course:</span> <span id="course"></span></p>
    <p class="info"><span class="label">Gender:</span> <span id="gender"></span></p>
    <p class="info"><span class="label">Location:</span> <span id="location"></span></p>
    <p class="info"><span class="label">Intake:</span> <span id="intake"></span></p>
    <p class="info"><span class="label">Mode:</span> <span id="mode"></span></p>
    <p class="info"><span class="label">Emergency:</span> <span id="emergency"></span></p>

  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "firebase/auth";
import { doc, getDoc } from "firebase/firestore";

// Protect page + load profile
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const docRef = doc(db, "students", user.uid);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();

    // NAME
    document.getElementById("fullname").innerText =
      data.fname + " " + data.lname;

    // BASIC INFO
    document.getElementById("email").innerText = data.email;
    document.getElementById("phone").innerText = data.phone;
    document.getElementById("course").innerText = data.course;
    document.getElementById("gender").innerText = data.gender;

    // LOCATION
    document.getElementById("location").innerText =
      data.country + ", " + data.county + ", " + data.subcounty + ", " + data.ward;

    // COURSE INFO
    document.getElementById("intake").innerText = data.intake;
    document.getElementById("mode").innerText = data.mode;

    // EMERGENCY
    document.getElementById("emergency").innerText =
      data.emergencyName + " (" + data.relationship + ")";

    // PROFILE IMAGE
    document.getElementById("profileImg").src =
      data.photoURL || "https://via.placeholder.com/120";

  } else {
    alert("No profile data found");
  }
});

// LOGOUT
window.logout = async function () {
  await signOut(auth);
  window.location.href = "index.html";
};
</script>

</body>
</html>
